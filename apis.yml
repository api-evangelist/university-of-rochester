aid: university-of-rochester
name: University of Rochester
description: >-
  The University of Rochester is a private research university in Rochester, New
  York, ranked #236 in the QS World University Rankings 2025. It does not operate
  a single official, centralized public developer portal; its publicly reachable
  programmatic surface is found across library and research-data infrastructure.
  The University of Rochester Research Repository (URRR) runs on the Figshare
  platform, which exposes a public REST API and an OAI-PMH endpoint, and the
  legacy UR Research institutional repository still serves a live OAI-PMH
  interface. The River Campus Libraries also maintain an active public GitHub
  organization with digital-library tooling. Most enterprise systems (SIS,
  identity/SSO, course/catalog) are gated and not publicly documented.
