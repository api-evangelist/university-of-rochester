reviews:
  - date: '2026-06-03'
    rating: 2
    summary: >-
      No centralized official developer portal was found for the University of
      Rochester. The verified public programmatic surface is third-party and
      library/research-data oriented: the URRR institutional repository runs on
      Figshare (public REST API at api.figshare.com/v2 confirmed live) and the
      legacy UR Research repository serves a live OAI-PMH interface that returns
      a valid Identify response. The River Campus Libraries GitHub org
      (rochester-rcl) is active with digital-library tooling. Enterprise SIS,
      identity/SSO, and course/catalog endpoints probed did not resolve publicly
      and appear gated. No endpoints were fabricated; only live-verified URLs are
      cataloged.
    endpoints:
      - url: https://www.rochester.edu/
        status: 200
        note: Official university website, resolves.
      - url: https://api.figshare.com/v2/articles
        status: 200
